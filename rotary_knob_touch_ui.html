<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#070809" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Mouse Pad" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icons/icon.svg" />
  <title>MQTT Rotary Touch Pad</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    :root {
      --cyan: #12d9ff;
      --cyan-soft: rgba(18, 217, 255, 0.32);
      --green: #40ff9d;
      --red: #ff5f73;
      --text: #e7f7ff;
      --muted: rgba(231, 247, 255, 0.56);
      --x: 50%;
      --y: 50%;
    }

    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      overscroll-behavior: none;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: "Segoe UI", "Noto Sans TC", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,.10), transparent 30%),
        radial-gradient(circle at 30% 65%, rgba(18,217,255,.08), transparent 34%),
        linear-gradient(180deg, #35383a, #141618 70%, #070809);
    }

    .console {
      width: min(96vw, 1180px);
      aspect-ratio: 8 / 3;
      min-height: 360px;
      max-height: 92vh;
      padding: clamp(12px, 1.8vw, 22px);
      border-radius: clamp(24px, 3vw, 38px);
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: clamp(10px, 1.3vw, 16px);
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,.09), transparent 28%),
        linear-gradient(145deg, #34383c, #17191c 68%);
      box-shadow:
        inset 0 1px 2px rgba(255,255,255,.16),
        inset 0 -32px 60px rgba(0,0,0,.35),
        0 36px 90px rgba(0,0,0,.55);
      position: relative;
      overflow: hidden;
    }

    .console::before {
      content: "";
      position: absolute;
      inset: 12px;
      border: 1px solid rgba(255,255,255,.06);
      border-radius: clamp(18px, 2.4vw, 30px);
      pointer-events: none;
      box-shadow: inset 0 0 50px rgba(0,0,0,.35);
    }

    .left-zone,
    .right-zone {
      position: relative;
      z-index: 2;
      min-width: 0;
      min-height: 0;
    }

    .left-zone {
      grid-column: 1 / span 4;
      grid-row: 1 / span 3;
      display: grid;
      grid-template-rows: 1fr 72px;
      gap: clamp(10px, 1.2vw, 14px);
    }

    .right-zone {
      grid-column: 5 / span 4;
      grid-row: 1 / span 3;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: clamp(10px, 1.2vw, 14px);
    }

    .pad-wrap {
      min-width: 0;
      min-height: 0;
      display: grid;
      place-items: center;
    }

    .touch-pad {
      width: min(100%, 100cqh);
      height: min(100%, 100cqw);
      aspect-ratio: 1;
      border-radius: clamp(24px, 4vw, 50px);
      position: relative;
      overflow: hidden;
      touch-action: none;
      cursor: crosshair;
      background:
        radial-gradient(circle at var(--x) var(--y), rgba(18,217,255,.24), transparent 18%),
        linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255,255,255,.045) 1px, transparent 1px),
        radial-gradient(circle at 50% 45%, #30353a, #111418 70%);
      background-size: auto, 38px 38px, 38px 38px, auto;
      box-shadow:
        inset 0 2px 3px rgba(255,255,255,.16),
        inset 0 -18px 36px rgba(0,0,0,.65),
        0 18px 34px rgba(0,0,0,.42);
      border: 1px solid rgba(255,255,255,.10);
    }

    .touch-pad::before {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: clamp(18px, 3.4vw, 38px);
      border: 1px solid rgba(18,217,255,.18);
      box-shadow: inset 0 0 24px rgba(18,217,255,.07);
      pointer-events: none;
    }

    .touch-pad::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 1px;
      height: 100%;
      transform: translate(-50%, -50%);
      background: linear-gradient(transparent, rgba(18,217,255,.22), transparent);
      pointer-events: none;
    }

    .cross-x {
      position: absolute;
      left: 0;
      top: 50%;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(18,217,255,.22), transparent);
      pointer-events: none;
    }

    .thumb {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: clamp(52px, 7vw, 84px);
      aspect-ratio: 1;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 40% 32%, rgba(255,255,255,.85), transparent 17%),
        radial-gradient(circle at 50% 55%, #1f2a30, #050607 72%);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow:
        inset 0 2px 4px rgba(255,255,255,.20),
        inset 0 -9px 18px rgba(0,0,0,.82),
        0 0 0 8px rgba(18,217,255,.06),
        0 0 24px var(--cyan-soft),
        0 12px 26px rgba(0,0,0,.55);
      pointer-events: none;
      transition: box-shadow .15s ease;
    }

    .dragging .thumb {
      box-shadow:
        inset 0 2px 4px rgba(255,255,255,.20),
        inset 0 -9px 18px rgba(0,0,0,.82),
        0 0 0 12px rgba(18,217,255,.10),
        0 0 34px rgba(18,217,255,.58),
        0 12px 26px rgba(0,0,0,.55);
    }

    .thumb span {
      width: 38%;
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 12px var(--cyan), 0 0 24px var(--cyan-soft);
    }

    .vector-line {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 3px;
      height: 0;
      transform-origin: 50% 0;
      background: linear-gradient(var(--cyan), transparent);
      border-radius: 99px;
      box-shadow: 0 0 12px var(--cyan-soft);
      pointer-events: none;
    }

    .corner-label {
      position: absolute;
      color: rgba(231,247,255,.36);
      font-size: clamp(9px, 1vw, 12px);
      letter-spacing: .09em;
      text-transform: uppercase;
      pointer-events: none;
    }

    .corner-label.t { top: 20px; left: 50%; transform: translateX(-50%); }
    .corner-label.b { bottom: 20px; left: 50%; transform: translateX(-50%); }
    .corner-label.l { left: 20px; top: 50%; transform: translateY(-50%) rotate(-90deg); }
    .corner-label.r { right: 20px; top: 50%; transform: translateY(-50%) rotate(90deg); }

    .click-scroll-row {
      display: grid;
      grid-template-columns: 1fr 1.15fr 1fr;
      gap: clamp(10px, 1.2vw, 14px);
      min-height: 0;
    }

    .btn {
      min-height: 0;
      border: 0;
      border-radius: 18px;
      color: var(--text);
      background: linear-gradient(145deg, #364047, #101315);
      box-shadow:
        inset 0 1px 2px rgba(255,255,255,.14),
        inset 0 -5px 9px rgba(0,0,0,.55),
        0 9px 18px rgba(0,0,0,.28);
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      letter-spacing: .04em;
    }

    .btn.primary {
      color: #06232a;
      background: linear-gradient(180deg, #b8f7ff, var(--cyan));
      box-shadow: 0 0 22px var(--cyan-soft), inset 0 1px 1px rgba(255,255,255,.75);
    }

    .btn:active { transform: translateY(1px); }

    .scroll-wheel {
      border-radius: 24px;
      position: relative;
      overflow: hidden;
      touch-action: none;
      cursor: ns-resize;
      background:
        linear-gradient(90deg, transparent 0 23%, rgba(255,255,255,.08) 24% 26%, transparent 27% 73%, rgba(255,255,255,.08) 74% 76%, transparent 77% 100%),
        repeating-linear-gradient(180deg, rgba(18,217,255,.24) 0 2px, transparent 2px 12px),
        linear-gradient(145deg, #30363b, #101315);
      border: 1px solid rgba(255,255,255,.10);
      box-shadow:
        inset 0 1px 2px rgba(255,255,255,.14),
        inset 0 -8px 16px rgba(0,0,0,.62),
        0 9px 18px rgba(0,0,0,.28);
    }

    .scroll-wheel::before,
    .scroll-wheel::after {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(231,247,255,.60);
      font-size: clamp(10px, .95vw, 12px);
      letter-spacing: .12em;
      pointer-events: none;
    }

    .scroll-wheel::before { content: "SCROLL ↑"; top: 8px; }
    .scroll-wheel::after { content: "SCROLL ↓"; bottom: 8px; }

    .scroll-thumb {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 46%;
      height: 24px;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      background: linear-gradient(180deg, #b8f7ff, var(--cyan));
      box-shadow:
        0 0 14px var(--cyan-soft),
        inset 0 1px 1px rgba(255,255,255,.8),
        inset 0 -4px 8px rgba(0,0,0,.25);
      pointer-events: none;
      transition: transform .12s ease;
    }

    .scroll-wheel.scrolling .scroll-thumb {
      box-shadow:
        0 0 24px rgba(18,217,255,.58),
        inset 0 1px 1px rgba(255,255,255,.8),
        inset 0 -4px 8px rgba(0,0,0,.25);
    }

    .card {
      padding: clamp(10px, 1.25vw, 14px);
      border-radius: 22px;
      background: linear-gradient(145deg, rgba(255,255,255,.06), rgba(0,0,0,.22));
      border: 1px solid rgba(255,255,255,.07);
      box-shadow: inset 0 1px 2px rgba(255,255,255,.08), 0 9px 22px rgba(0,0,0,.22);
      min-width: 0;
      min-height: 0;
    }

    .top-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .title h1 {
      margin: 0;
      font-size: clamp(19px, 2.35vw, 30px);
      letter-spacing: .05em;
      line-height: 1.08;
    }

    .title p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: clamp(10px, 1.12vw, 13px);
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 9px 12px;
      border-radius: 999px;
      background: linear-gradient(145deg, #2b3034, #111316);
      box-shadow:
        inset 0 1px 2px rgba(255,255,255,.14),
        inset 0 -5px 9px rgba(0,0,0,.45),
        0 9px 22px rgba(0,0,0,.25);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 10px rgba(255,95,115,.7);
    }

    .connected .dot {
      background: var(--green);
      box-shadow: 0 0 12px rgba(64,255,157,.85);
    }

    .settings-card {
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 12px;
      align-items: stretch;
    }

    .field-stack {
      display: grid;
      gap: 8px;
    }

    label {
      display: block;
      margin: 0 0 5px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: .06em;
    }

    input, button, select { font: inherit; }

    input[type="text"], input[type="number"] {
      width: 100%;
      min-height: 34px;
      padding: 7px 10px;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 13px;
      outline: none;
      color: var(--text);
      background: rgba(0,0,0,.30);
      box-shadow: inset 0 1px 6px rgba(0,0,0,.35);
      font-size: 12px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--cyan);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .range-stack {
      display: grid;
      gap: 8px;
      align-content: center;
    }

    .meter-log-card {
      display: grid;
      align-items: center;
      overflow: hidden;
    }

    .meter {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      font-variant-numeric: tabular-nums;
    }

    .metric {
      padding: 9px 8px;
      border-radius: 15px;
      background: rgba(0,0,0,.24);
      color: rgba(231,247,255,.72);
      font-size: clamp(10px, .95vw, 12px);
      white-space: nowrap;
      overflow: visible;
      text-align: center;
    }

    .metric b {
      display: block;
      margin-top: 3px;
      color: var(--cyan);
      font-size: clamp(16px, 1.7vw, 22px);
      line-height: 1.05;
    }


    @media (max-width: 900px) {
      body { overflow: auto; }
      .console {
        width: min(96vw, 720px);
        aspect-ratio: auto;
        min-height: auto;
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        margin: 14px 0;
      }

      .left-zone,
      .right-zone {
        grid-column: 1;
        grid-row: auto;
      }

      .left-zone { grid-template-rows: min(86vw, 510px) 78px; }
      .right-zone { grid-template-rows: auto auto auto; }
      .settings-card { grid-template-columns: 1fr; }
      .meter { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (orientation: landscape) and (max-height: 620px) {
      body {
        place-items: stretch;
        overflow: hidden;
      }

      .console {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        max-height: none;
        min-height: 0;
        aspect-ratio: auto;
        border-radius: 0;
        padding:
          max(10px, env(safe-area-inset-top))
          max(12px, env(safe-area-inset-right))
          max(10px, env(safe-area-inset-bottom))
          max(12px, env(safe-area-inset-left));
      }
    }
  </style>
</head>
<body>
  <main class="console" id="app">
    <section class="left-zone">
      <div class="pad-wrap">
        <div class="touch-pad" id="pad" aria-label="MQTT 觸控滑鼠板">
          <div class="cross-x"></div>
          <div class="vector-line" id="vectorLine"></div>
          <div class="thumb"><span></span></div>
          <div class="corner-label t">UP</div>
          <div class="corner-label b">DOWN</div>
          <div class="corner-label l">LEFT</div>
          <div class="corner-label r">RIGHT</div>
        </div>
      </div>

      <div class="click-scroll-row">
        <button class="btn" id="leftClickBtn">左鍵 Click</button>
        <div class="scroll-wheel" id="scrollWheel" aria-label="捲動滾輪">
          <div class="scroll-thumb" id="scrollThumb"></div>
        </div>
        <button class="btn" id="rightClickBtn">右鍵 Click</button>
      </div>
    </section>

    <section class="right-zone">
      <div class="card top-card">
        <div class="title">
          <h1>PJJ Mouse Pad</h1>
          <p>透過 MQTT 將觸控操作送到電腦滑鼠接收器</p>
        </div>
        <div class="status" id="status"><span class="dot"></span><span id="statusText">MQTT 未連線</span></div>
      </div>

      <div class="card settings-card">
        <div class="field-stack">
          <div>
            <label>MQTT WebSocket Broker</label>
            <input id="brokerInput" type="text" value="wss://broker.emqx.io:8084/mqtt" />
          </div>
          <div>
            <label>Publish Topic</label>
            <input id="topicInput" type="text" value="JJ/mouse/pad/cmd" />
          </div>
          <div class="row">
            <button class="btn primary" id="connectBtn">連線</button>
            <button class="btn" id="disconnectBtn">斷線</button>
          </div>
        </div>

        <div class="range-stack">
          <div>
            <label>滑鼠速度：<span id="speedText">1.6</span>x</label>
            <input id="speedRange" type="range" min="0.4" max="5" step="0.1" value="1.6" />
          </div>
          <div>
            <label>送出間隔：<span id="rateText">35</span> ms</label>
            <input id="rateRange" type="range" min="20" max="120" step="5" value="35" />
          </div>
        </div>
      </div>

      <div class="card meter-log-card">
        <div class="meter">
          <div class="metric">DX<b id="dxText">0</b></div>
          <div class="metric">DY<b id="dyText">0</b></div>
          <div class="metric">封包<b id="countText">0</b></div>
          <div class="metric">模式<b>PAD</b></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const app = document.getElementById('app');
    const pad = document.getElementById('pad');
    const vectorLine = document.getElementById('vectorLine');
    const statusText = document.getElementById('statusText');
    const brokerInput = document.getElementById('brokerInput');
    const topicInput = document.getElementById('topicInput');
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const speedRange = document.getElementById('speedRange');
    const rateRange = document.getElementById('rateRange');
    const speedText = document.getElementById('speedText');
    const rateText = document.getElementById('rateText');
    const dxText = document.getElementById('dxText');
    const dyText = document.getElementById('dyText');
    const countText = document.getElementById('countText');
    const scrollWheel = document.getElementById('scrollWheel');
    const scrollThumb = document.getElementById('scrollThumb');

    const DEVICE_ID = 'webpad_' + Math.random().toString(16).slice(2, 8);
    let client = null;
    let connected = false;
    let dragging = false;
    let lastX = 0;
    let lastY = 0;
    let lastSend = 0;
    let packetCount = 0;
    let scrollDragging = false;
    let lastScrollY = 0;
    let lastScrollSend = 0;
    let scrollVisualOffset = 0;
    let immersiveRequested = false;

    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(error => log('Service worker error: ' + error.message));
      });
    }

    async function enterImmersiveMode() {
      if (immersiveRequested) return;
      immersiveRequested = true;

      try {
        if (!document.fullscreenElement && document.documentElement.requestFullscreen) {
          await document.documentElement.requestFullscreen({ navigationUI: 'hide' });
        }
      } catch (error) {
        log('Fullscreen skipped: ' + error.message);
      }

      try {
        if (screen.orientation && screen.orientation.lock) {
          await screen.orientation.lock('landscape');
        }
      } catch (error) {
        log('Orientation lock skipped: ' + error.message);
      }
    }

    function log(msg) {
      const now = new Date().toLocaleTimeString();
      console.log(`[${now}] ${msg}`);
    }

    function setStatus(ok, text) {
      connected = ok;
      app.classList.toggle('connected', ok);
      statusText.textContent = text;
    }

    function getTopic() {
      return topicInput.value.trim() || 'JJ/mouse/pad/cmd';
    }

    function publish(payload) {
      payload.dev_id = DEVICE_ID;
      payload.ts = Date.now();

      if (!client || !connected) {
        log('尚未連線，略過送出：' + JSON.stringify(payload));
        return;
      }

      client.publish(getTopic(), JSON.stringify(payload), { qos: 0, retain: false });
      packetCount++;
      countText.textContent = packetCount;
    }

    function connectMQTT() {
      enterImmersiveMode();
      const url = brokerInput.value.trim();
      if (!url) return;

      if (client) {
        try { client.end(true); } catch(e) {}
      }

      setStatus(false, 'MQTT 連線中...');
      log('Connecting to ' + url);

      client = mqtt.connect(url, {
        clientId: 'JJ_MousePad_' + Math.random().toString(16).slice(2),
        clean: true,
        reconnectPeriod: 2000,
        connectTimeout: 5000
      });

      client.on('connect', () => {
        setStatus(true, 'MQTT 已連線');
        log('MQTT connected, topic=' + getTopic());
        publish({ type: 'hello', target: 'pc_mouse' });
      });

      client.on('reconnect', () => setStatus(false, 'MQTT 重新連線中...'));
      client.on('close', () => setStatus(false, 'MQTT 已斷線'));
      client.on('error', err => log('MQTT error: ' + err.message));
    }

    function disconnectMQTT() {
      if (client) client.end(true);
      client = null;
      setStatus(false, 'MQTT 已斷線');
      log('Disconnected');
    }

    function clamp(n, min, max) {
      return Math.max(min, Math.min(max, n));
    }

    function setPadVisual(clientX, clientY, dx = 0, dy = 0) {
      const rect = pad.getBoundingClientRect();
      const x = clamp(clientX - rect.left, 0, rect.width);
      const y = clamp(clientY - rect.top, 0, rect.height);
      const xp = (x / rect.width) * 100;
      const yp = (y / rect.height) * 100;
      pad.style.setProperty('--x', xp + '%');
      pad.style.setProperty('--y', yp + '%');

      const len = Math.min(Math.hypot(dx, dy) * 2.2, rect.width * 0.32);
      const angle = Math.atan2(dy, dx) * 180 / Math.PI + 90;
      vectorLine.style.height = len + 'px';
      vectorLine.style.transform = `rotate(${angle}deg)`;
    }

    function sendMove(rawDx, rawDy, force = false) {
      const now = performance.now();
      const rate = Number(rateRange.value);
      if (!force && now - lastSend < rate) return;
      lastSend = now;

      const speed = Number(speedRange.value);
      const dx = Math.round(rawDx * speed);
      const dy = Math.round(rawDy * speed);
      if (dx === 0 && dy === 0) return;

      dxText.textContent = dx;
      dyText.textContent = dy;
      publish({ type: 'move', target: 'pc_mouse', dx, dy });
    }

    function sendScroll(rawDeltaY, force = false) {
      const now = performance.now();
      const rate = Number(rateRange.value);
      if (!force && now - lastScrollSend < rate) return;
      lastScrollSend = now;

      const scrollPower = Math.round(clamp(-rawDeltaY * 0.45, -8, 8));
      if (scrollPower === 0) return;

      scrollVisualOffset = clamp(scrollVisualOffset + rawDeltaY * 0.22, -18, 18);
      scrollThumb.style.transform = `translate(-50%, calc(-50% + ${scrollVisualOffset}px))`;
      window.clearTimeout(scrollThumb._timer);
      scrollThumb._timer = window.setTimeout(() => {
        scrollVisualOffset = 0;
        scrollThumb.style.transform = 'translate(-50%, -50%)';
      }, 120);

      publish({ type: 'scroll', target: 'pc_mouse', dy: scrollPower });
    }

    pad.addEventListener('pointerdown', event => {
      enterImmersiveMode();
      dragging = true;
      pad.classList.add('dragging');
      pad.setPointerCapture(event.pointerId);
      lastX = event.clientX;
      lastY = event.clientY;
      setPadVisual(event.clientX, event.clientY, 0, 0);
      publish({ type: 'start', target: 'pc_mouse' });
    });

    pad.addEventListener('pointermove', event => {
      if (!dragging) return;
      const dx = event.clientX - lastX;
      const dy = event.clientY - lastY;
      lastX = event.clientX;
      lastY = event.clientY;
      setPadVisual(event.clientX, event.clientY, dx, dy);
      sendMove(dx, dy);
    });

    function stopPad() {
      dragging = false;
      pad.classList.remove('dragging');
      vectorLine.style.height = '0px';
      dxText.textContent = '0';
      dyText.textContent = '0';
      publish({ type: 'stop', target: 'pc_mouse' });
    }

    pad.addEventListener('pointerup', stopPad);
    pad.addEventListener('pointercancel', stopPad);
    pad.addEventListener('lostpointercapture', () => {
      if (dragging) stopPad();
    });

    document.getElementById('leftClickBtn').addEventListener('click', () => {
      enterImmersiveMode();
      publish({ type: 'click', target: 'pc_mouse', button: 'left' });
    });
    document.getElementById('rightClickBtn').addEventListener('click', () => {
      enterImmersiveMode();
      publish({ type: 'click', target: 'pc_mouse', button: 'right' });
    });

    scrollWheel.addEventListener('pointerdown', event => {
      enterImmersiveMode();
      scrollDragging = true;
      scrollWheel.classList.add('scrolling');
      scrollWheel.setPointerCapture(event.pointerId);
      lastScrollY = event.clientY;
      publish({ type: 'scroll_start', target: 'pc_mouse' });
    });

    scrollWheel.addEventListener('pointermove', event => {
      if (!scrollDragging) return;
      const dy = event.clientY - lastScrollY;
      lastScrollY = event.clientY;
      sendScroll(dy);
    });

    function stopScroll() {
      scrollDragging = false;
      scrollWheel.classList.remove('scrolling');
      scrollVisualOffset = 0;
      scrollThumb.style.transform = 'translate(-50%, -50%)';
      publish({ type: 'scroll_stop', target: 'pc_mouse' });
    }

    scrollWheel.addEventListener('pointerup', stopScroll);
    scrollWheel.addEventListener('pointercancel', stopScroll);
    scrollWheel.addEventListener('lostpointercapture', () => {
      if (scrollDragging) stopScroll();
    });

    scrollWheel.addEventListener('wheel', event => {
      event.preventDefault();
      sendScroll(event.deltaY, true);
    }, { passive: false });

    connectBtn.addEventListener('click', connectMQTT);
    disconnectBtn.addEventListener('click', disconnectMQTT);
    speedRange.addEventListener('input', () => speedText.textContent = speedRange.value);
    rateRange.addEventListener('input', () => rateText.textContent = rateRange.value);

    setStatus(false, 'MQTT 未連線');
    log('Device ID: ' + DEVICE_ID);
    log('Ready. Install as PWA for fullscreen landscape mode.');
  </script>
</body>
</html>
