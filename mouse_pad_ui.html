<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Mouse Pad" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icons/icon.svg" />
  <title>Mouse Pad UI</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script src="./mouse_pad_config.js"></script>
  <style>
    :root {
      --cyan: #12d9ff;
      --cyan-soft: rgba(18, 217, 255, .32);
      --green: #40ff9d;
      --red: #ff5f73;
      --text: #e7f7ff;
      --muted: rgba(231, 247, 255, .62);
      --panel: #17191c;
      --line: rgba(255,255,255,.10);
      --x: 50%;
      --y: 50%;
    }

    * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; overscroll-behavior: none; background: #000; color: var(--text); font-family: "Segoe UI", "Noto Sans TC", system-ui, sans-serif; }
    body { display: grid; place-items: center; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }

    .stage {
      width: min(100vw, calc(100dvh * 16 / 9));
      height: min(100dvh, calc(100vw * 9 / 16));
      min-width: 0;
      min-height: 0;
      background: #000;
    }

    .console {
      width: 100%;
      height: 100%;
      padding: clamp(8px, 1.2vw, 18px);
      position: relative;
      overflow: hidden;
      background: radial-gradient(circle at 50% 0%, rgba(255,255,255,.09), transparent 28%), linear-gradient(145deg, #34383c, var(--panel) 68%);
      box-shadow: inset 0 1px 2px rgba(255,255,255,.16), inset 0 -32px 60px rgba(0,0,0,.35);
    }

    .console::before {
      content: "";
      position: absolute;
      inset: clamp(7px, .9vw, 12px);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: clamp(16px, 2vw, 30px);
      pointer-events: none;
      box-shadow: inset 0 0 50px rgba(0,0,0,.35);
    }

    .page {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
      display: none;
      gap: clamp(8px, 1vw, 14px);
    }
    .page.active { display: grid; }

    .settings-page { grid-template-columns: minmax(0, 1.15fr) minmax(0, .85fr); }
    .control-page { grid-template-columns: minmax(190px, .58fr) minmax(82px, .32fr) minmax(0, 1.25fr); }

    .panel {
      min-width: 0;
      min-height: 0;
      padding: clamp(9px, 1vw, 14px);
      border-radius: clamp(14px, 1.8vw, 22px);
      background: linear-gradient(145deg, rgba(255,255,255,.06), rgba(0,0,0,.22));
      border: 1px solid rgba(255,255,255,.07);
      box-shadow: inset 0 1px 2px rgba(255,255,255,.08), 0 9px 22px rgba(0,0,0,.22);
      display: grid;
      overflow: hidden;
    }

    .settings-main { grid-template-rows: auto minmax(0, 1fr) auto; gap: clamp(8px, 1vw, 14px); }
    .settings-form { display: grid; align-content: center; gap: clamp(8px, .9vw, 12px); }
    .settings-side { grid-template-rows: auto 1fr auto; gap: clamp(8px, 1vw, 14px); }
    .control-main { grid-template-rows: minmax(0, 1fr) clamp(56px, 10dvh, 82px); gap: clamp(8px, 1vw, 14px); }
    .wheel-zone { grid-template-rows: minmax(54px, 1fr) minmax(0, 1.8fr) minmax(54px, 1fr); gap: clamp(8px, 1vw, 14px); }
    .control-side { grid-template-rows: auto minmax(0, 1fr); gap: clamp(8px, 1vw, 14px); }

    .title-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; min-width: 0; }
    h1, h2 { margin: 0; line-height: 1.05; letter-spacing: .04em; }
    h1 { font-size: clamp(20px, 2.6vw, 38px); }
    h2 { font-size: clamp(15px, 1.55vw, 22px); color: rgba(231,247,255,.86); }
    .hint { margin: 0; color: var(--muted); font-size: clamp(11px, 1vw, 14px); line-height: 1.45; }

    .status { display: inline-flex; align-items: center; gap: 8px; padding: 8px 11px; border-radius: 999px; background: linear-gradient(145deg, #2b3034, #111316); box-shadow: inset 0 1px 2px rgba(255,255,255,.14), inset 0 -5px 9px rgba(0,0,0,.45), 0 9px 22px rgba(0,0,0,.25); color: var(--muted); font-size: clamp(10px, 1vw, 13px); white-space: nowrap; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--red); box-shadow: 0 0 10px rgba(255,95,115,.7); }
    .connected .dot { background: var(--green); box-shadow: 0 0 12px rgba(64,255,157,.85); }

    .field { min-width: 0; }
    label { display: block; margin: 0 0 5px; font-size: clamp(9px, .82vw, 11px); color: var(--muted); letter-spacing: .06em; }
    input, button { font: inherit; }
    input[type="text"] { width: 100%; min-height: clamp(32px, 5.3dvh, 42px); padding: 7px 10px; border: 1px solid var(--line); border-radius: 13px; outline: none; color: var(--text); background: rgba(0,0,0,.30); box-shadow: inset 0 1px 6px rgba(0,0,0,.35); font-size: clamp(11px, 1vw, 14px); }
    input[type="range"] { width: 100%; accent-color: var(--cyan); }
    .range-value { color: var(--cyan); font-weight: 800; }

    .button-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; min-height: 0; }
    .button-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; min-height: 0; }
    .utility-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); align-content: stretch; }

    .btn { min-width: 0; min-height: 0; border: 0; border-radius: clamp(12px, 1.5vw, 18px); color: var(--text); background: linear-gradient(145deg, #364047, #101315); box-shadow: inset 0 1px 2px rgba(255,255,255,.14), inset 0 -5px 9px rgba(0,0,0,.55), 0 9px 18px rgba(0,0,0,.28); cursor: pointer; font-size: clamp(11px, 1.15vw, 16px); font-weight: 800; letter-spacing: .03em; padding: 8px 10px; }
    .btn.primary { color: #06232a; background: linear-gradient(180deg, #b8f7ff, var(--cyan)); box-shadow: 0 0 22px var(--cyan-soft), inset 0 1px 1px rgba(255,255,255,.75); }
    .btn.danger { color: #ffdfe4; background: linear-gradient(145deg, #63313a, #171013); }
    .btn:active { transform: translateY(1px); }

    .pad-wrap { min-width: 0; min-height: 0; display: grid; place-items: center; }
    .touch-pad { width: min(100%, 100cqh); height: min(100%, 100cqw); aspect-ratio: 1; border-radius: clamp(18px, 3.4vw, 50px); position: relative; overflow: hidden; touch-action: none; -webkit-user-select: none; -webkit-touch-callout: none; cursor: crosshair; background: radial-gradient(circle at var(--x) var(--y), rgba(18,217,255,.24), transparent 18%), linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px), linear-gradient(0deg, rgba(255,255,255,.045) 1px, transparent 1px), radial-gradient(circle at 50% 45%, #30353a, #111418 70%); background-size: auto, clamp(26px, 3.2vw, 38px) clamp(26px, 3.2vw, 38px), clamp(26px, 3.2vw, 38px) clamp(26px, 3.2vw, 38px), auto; box-shadow: inset 0 2px 3px rgba(255,255,255,.16), inset 0 -18px 36px rgba(0,0,0,.65), 0 18px 34px rgba(0,0,0,.42); border: 1px solid var(--line); }
    .touch-pad::before { content: ""; position: absolute; inset: clamp(9px, 1.1vw, 14px); border-radius: clamp(14px, 2.7vw, 38px); border: 1px solid rgba(18,217,255,.18); box-shadow: inset 0 0 24px rgba(18,217,255,.07); pointer-events: none; }
    .touch-pad::after, .cross-x { content: ""; position: absolute; pointer-events: none; background: linear-gradient(transparent, rgba(18,217,255,.22), transparent); }
    .touch-pad::after { left: 50%; top: 50%; width: 1px; height: 100%; transform: translate(-50%, -50%); }
    .cross-x { left: 0; top: 50%; width: 100%; height: 1px; background: linear-gradient(90deg, transparent, rgba(18,217,255,.22), transparent); }
    .thumb { position: absolute; left: var(--x); top: var(--y); width: clamp(38px, 5.4vw, 84px); aspect-ratio: 1; transform: translate(-50%, -50%); border-radius: 50%; display: grid; place-items: center; background: radial-gradient(circle at 40% 32%, rgba(255,255,255,.85), transparent 17%), radial-gradient(circle at 50% 55%, #1f2a30, #050607 72%); border: 1px solid rgba(255,255,255,.16); box-shadow: inset 0 2px 4px rgba(255,255,255,.20), inset 0 -9px 18px rgba(0,0,0,.82), 0 0 0 8px rgba(18,217,255,.06), 0 0 24px var(--cyan-soft), 0 12px 26px rgba(0,0,0,.55); pointer-events: none; transition: box-shadow .15s ease; }
    .dragging .thumb { box-shadow: inset 0 2px 4px rgba(255,255,255,.20), inset 0 -9px 18px rgba(0,0,0,.82), 0 0 0 12px rgba(18,217,255,.10), 0 0 34px rgba(18,217,255,.58), 0 12px 26px rgba(0,0,0,.55); }
    .thumb span { width: 38%; aspect-ratio: 1; border-radius: 50%; background: var(--cyan); box-shadow: 0 0 12px var(--cyan), 0 0 24px var(--cyan-soft); }
    .vector-line { position: absolute; left: 50%; top: 50%; width: 3px; height: 0; transform-origin: 50% 0; background: linear-gradient(var(--cyan), transparent); border-radius: 99px; box-shadow: 0 0 12px var(--cyan-soft); pointer-events: none; }

    .wheel-card { border-radius: clamp(16px, 2vw, 26px); position: relative; overflow: hidden; touch-action: none; cursor: ns-resize; background: linear-gradient(90deg, transparent 0 23%, rgba(255,255,255,.08) 24% 26%, transparent 27% 73%, rgba(255,255,255,.08) 74% 76%, transparent 77% 100%), repeating-linear-gradient(180deg, rgba(18,217,255,.24) 0 2px, transparent 2px 12px), linear-gradient(145deg, #30363b, #101315); border: 1px solid var(--line); box-shadow: inset 0 1px 2px rgba(255,255,255,.14), inset 0 -8px 16px rgba(0,0,0,.62), 0 9px 18px rgba(0,0,0,.28); }
    .wheel-card::before, .wheel-card::after { position: absolute; left: 50%; transform: translateX(-50%); color: rgba(231,247,255,.60); font-size: clamp(8px, .8vw, 12px); letter-spacing: .12em; pointer-events: none; white-space: nowrap; }
    .wheel-card::before { content: "SCROLL UP"; top: 8px; }
    .wheel-card::after { content: "SCROLL DOWN"; bottom: 8px; }
    .scroll-thumb { position: absolute; left: 50%; top: 50%; width: 58%; height: clamp(16px, 3dvh, 28px); transform: translate(-50%, -50%); border-radius: 999px; background: linear-gradient(180deg, #b8f7ff, var(--cyan)); box-shadow: 0 0 14px var(--cyan-soft), inset 0 1px 1px rgba(255,255,255,.8), inset 0 -4px 8px rgba(0,0,0,.25); pointer-events: none; transition: transform .12s ease; }
    .wheel-card.scrolling .scroll-thumb { box-shadow: 0 0 24px rgba(18,217,255,.58), inset 0 1px 1px rgba(255,255,255,.8), inset 0 -4px 8px rgba(0,0,0,.25); }

    @media (orientation: portrait) {
      .stage { width: 100vw; height: 100dvh; }
      .settings-page { grid-template-columns: 1fr; grid-template-rows: minmax(0, 1fr) auto; }
      .control-page { grid-template-columns: minmax(160px, .58fr) minmax(78px, .3fr) minmax(0, 1.2fr); grid-template-rows: minmax(0, 1fr); }
      .control-side { grid-template-rows: auto minmax(0, 1fr); }
      .utility-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="stage">
    <main class="console" id="app">
      <section class="page settings-page active" id="settingsPage">
        <div class="panel settings-main">
          <div class="title-row">
            <h1>PJJ Mouse Pad</h1>
            <div class="status"><span class="dot"></span><span id="statusText">MQTT 未連線</span></div>
          </div>
          <div class="settings-form">
            <div class="field">
              <label>MQTT WebSocket Broker</label>
              <input id="brokerInput" type="text" value="wss://broker.emqx.io:8084/mqtt" />
            </div>
            <div class="field">
              <label>Publish Topic</label>
              <input id="topicInput" type="text" value="JJ/mouse/pad/cmd" />
            </div>
            <div class="field">
              <label>滑鼠速度：<span class="range-value" id="speedText">1.6</span>x</label>
              <input id="speedRange" type="range" min="0.4" max="10" step="0.1" value="1.6" />
            </div>
            <div class="field">
              <label>送出間隔：<span class="range-value" id="rateText">35</span> ms</label>
              <input id="rateRange" type="range" min="20" max="60" step="5" value="35" />
            </div>
            <div class="field">
              <label>滾輪速度：<span class="range-value" id="scrollSpeedText">1.0</span>x</label>
              <input id="scrollSpeedRange" type="range" min="0.5" max="50" step="0.5" value="1.0" />
            </div>
          </div>
          <div class="button-row">
            <button class="btn primary" id="connectBtn">連線</button>
            <button class="btn" id="disconnectBtn">斷線</button>
          </div>
        </div>

        <div class="panel settings-side">
          <h2>設定頁</h2>
          <p class="hint">連線與速度設定放在這裡。設定完成後切到操控頁，MQTT 連線會保持在同一個頁面狀態中。</p>
          <button class="btn primary" id="goControlBtn">前往操控頁</button>
        </div>
      </section>

      <section class="page control-page" id="controlPage">
        <div class="panel control-side">
          <div class="title-row">
            <h2>操控頁</h2>
            <button class="btn" id="goSettingsBtn">設定</button>
          </div>
          <div class="button-grid utility-grid">
            <button class="btn" data-hotkey="window_close">關閉視窗</button>
            <button class="btn" data-hotkey="window_maximize">放大視窗</button>
            <button class="btn" data-hotkey="window_fullscreen">全螢幕視窗</button>
            <button class="btn" data-hotkey="window_minimize">縮小視窗</button>
            <button class="btn" data-hotkey="tab_switch">切換分頁</button>
            <button class="btn danger" data-hotkey="tab_close">關閉分頁</button>
            <button class="btn" data-hotkey="reload">重新整理</button>
            <button class="btn primary" data-hotkey="tab_new">開新分頁</button>
            <button class="btn" data-hotkey="tab_prev">前分頁</button>
            <button class="btn" data-hotkey="tab_switch">後分頁</button>
          </div>
        </div>

        <div class="panel wheel-zone">
          <button class="btn" id="pageUpBtn">上頁</button>
          <div class="wheel-card" id="scrollWheel" aria-label="上下滑動滾輪">
            <div class="scroll-thumb" id="scrollThumb"></div>
          </div>
          <button class="btn" id="pageDownBtn">下頁</button>
        </div>

        <div class="panel control-main">
          <div class="pad-wrap">
            <div class="touch-pad" id="pad" aria-label="MQTT 觸控滑鼠板">
              <div class="cross-x"></div>
              <div class="vector-line" id="vectorLine"></div>
              <div class="thumb"><span></span></div>
            </div>
          </div>
          <div class="button-row">
            <button class="btn" id="leftClickBtn">左鍵</button>
            <button class="btn" id="rightClickBtn">右鍵</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const app = document.getElementById('app');
    const settingsPage = document.getElementById('settingsPage');
    const controlPage = document.getElementById('controlPage');
    const pad = document.getElementById('pad');
    const vectorLine = document.getElementById('vectorLine');
    const statusText = document.getElementById('statusText');
    const brokerInput = document.getElementById('brokerInput');
    const topicInput = document.getElementById('topicInput');
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const goControlBtn = document.getElementById('goControlBtn');
    const goSettingsBtn = document.getElementById('goSettingsBtn');
    const speedRange = document.getElementById('speedRange');
    const rateRange = document.getElementById('rateRange');
    const speedText = document.getElementById('speedText');
    const rateText = document.getElementById('rateText');
    const scrollWheel = document.getElementById('scrollWheel');
    const scrollThumb = document.getElementById('scrollThumb');
    const scrollSpeedRange = document.getElementById('scrollSpeedRange');
    const scrollSpeedText = document.getElementById('scrollSpeedText');
    const pageUpBtn = document.getElementById('pageUpBtn');
    const pageDownBtn = document.getElementById('pageDownBtn');

    const DEVICE_ID = 'webpad_' + Math.random().toString(16).slice(2, 8);
    let client = null;
    let connected = false;
    let dragging = false;
    let lastX = 0;
    let lastY = 0;
    let lastSend = 0;
    let scrollDragging = false;
    let lastScrollY = 0;
    let lastScrollSend = 0;
    let scrollVisualOffset = 0;
    let immersiveRequested = false;
    let lastPadTap = 0;
    let padStartX = 0;
    let padStartY = 0;

    applyConfig();
    applyUrlParams();

    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(error => log('Service worker error: ' + error.message));
      });
    }

    function showPage(name) {
      settingsPage.classList.toggle('active', name === 'settings');
      controlPage.classList.toggle('active', name === 'control');
      enterImmersiveMode();
    }

    function normalizeBroker(value) {
      const broker = value.trim();
      if (!broker) return '';
      if (broker.toLowerCase().startsWith('ws://') || broker.toLowerCase().startsWith('wss://')) return broker;
      return 'wss://' + broker;
    }

    function applyConfig() {
      const mqttConfig = (window.MOUSE_PAD_CONFIG && window.MOUSE_PAD_CONFIG.mqtt) || {};
      if (mqttConfig.websocketUrl) brokerInput.value = normalizeBroker(mqttConfig.websocketUrl);
      if (mqttConfig.topic) topicInput.value = mqttConfig.topic.trim();
    }

    function applyUrlParams() {
      const params = new URLSearchParams(window.location.search);
      const brokerParam = params.get('wss') || params.get('broker') || params.get('mqtt');
      const topicParam = params.get('topic');
      if (brokerParam) brokerInput.value = normalizeBroker(brokerParam);
      if (topicParam) topicInput.value = topicParam.trim();
    }

    async function enterImmersiveMode() {
      if (immersiveRequested) return;
      immersiveRequested = true;

      try {
        if (!document.fullscreenElement && document.documentElement.requestFullscreen) {
          await document.documentElement.requestFullscreen({ navigationUI: 'hide' });
        }
      } catch (error) {
        log('Fullscreen skipped: ' + error.message);
      }

      try {
        if (screen.orientation && screen.orientation.lock) {
          await screen.orientation.lock('landscape');
        }
      } catch (error) {
        log('Orientation lock skipped: ' + error.message);
      }
    }

    function log(msg) {
      const now = new Date().toLocaleTimeString();
      console.log('[' + now + '] ' + msg);
    }

    function setStatus(ok, text) {
      connected = ok;
      app.classList.toggle('connected', ok);
      statusText.textContent = text;
    }

    function getTopic() {
      return topicInput.value.trim() || 'JJ/mouse/pad/cmd';
    }

    function publish(payload) {
      payload.dev_id = DEVICE_ID;
      payload.ts = Date.now();

      if (!client || !connected) {
        log('尚未連線，略過送出：' + JSON.stringify(payload));
        return;
      }

      client.publish(getTopic(), JSON.stringify(payload), { qos: 0, retain: false });
    }

    function connectMQTT() {
      enterImmersiveMode();
      const url = normalizeBroker(brokerInput.value);
      if (!url) return;
      brokerInput.value = url;

      if (client) {
        try { client.end(true); } catch(e) {}
      }

      setStatus(false, 'MQTT 連線中...');
      log('Connecting to ' + url);

      client = mqtt.connect(url, {
        clientId: 'JJ_MousePad_' + Math.random().toString(16).slice(2),
        clean: true,
        reconnectPeriod: 2000,
        connectTimeout: 5000
      });

      client.on('connect', () => {
        setStatus(true, 'MQTT 已連線');
        log('MQTT connected, topic=' + getTopic());
        publish({ type: 'hello', target: 'pc_mouse' });
      });

      client.on('reconnect', () => setStatus(false, 'MQTT 重新連線中...'));
      client.on('close', () => setStatus(false, 'MQTT 已斷線'));
      client.on('error', err => log('MQTT error: ' + err.message));
    }

    function disconnectMQTT() {
      if (client) client.end(true);
      client = null;
      setStatus(false, 'MQTT 已斷線');
      log('Disconnected');
    }

    function clamp(n, min, max) {
      return Math.max(min, Math.min(max, n));
    }

    function setPadVisual(clientX, clientY, dx = 0, dy = 0) {
      const rect = pad.getBoundingClientRect();
      const x = clamp(clientX - rect.left, 0, rect.width);
      const y = clamp(clientY - rect.top, 0, rect.height);
      pad.style.setProperty('--x', (x / rect.width) * 100 + '%');
      pad.style.setProperty('--y', (y / rect.height) * 100 + '%');

      const len = Math.min(Math.hypot(dx, dy) * 2.2, rect.width * 0.32);
      const angle = Math.atan2(dy, dx) * 180 / Math.PI + 90;
      vectorLine.style.height = len + 'px';
      vectorLine.style.transform = 'rotate(' + angle + 'deg)';
    }

    function sendMove(rawDx, rawDy, force = false) {
      const now = performance.now();
      const rate = Number(rateRange.value);
      if (!force && now - lastSend < rate) return;
      lastSend = now;

      const speed = Number(speedRange.value);
      const dx = Math.round(rawDx * speed);
      const dy = Math.round(rawDy * speed);
      if (dx === 0 && dy === 0) return;

      publish({ type: 'move', target: 'pc_mouse', dx, dy });
    }

    function sendScroll(rawDeltaY, force = false) {
      const now = performance.now();
      const rate = Number(rateRange.value);
      if (!force && now - lastScrollSend < rate) return;
      lastScrollSend = now;

      const scrollSpeed = Number(scrollSpeedRange.value);
      const scrollPower = Math.round(clamp(-rawDeltaY * 0.45 * scrollSpeed, -400, 400));
      if (scrollPower === 0) return;

      scrollVisualOffset = clamp(scrollVisualOffset + rawDeltaY * 0.22, -18, 18);
      scrollThumb.style.transform = 'translate(-50%, calc(-50% + ' + scrollVisualOffset + 'px))';
      window.clearTimeout(scrollThumb._timer);
      scrollThumb._timer = window.setTimeout(() => {
        scrollVisualOffset = 0;
        scrollThumb.style.transform = 'translate(-50%, -50%)';
      }, 120);

      publish({ type: 'scroll', target: 'pc_mouse', dy: scrollPower });
    }

    function sendPage(direction) {
      enterImmersiveMode();
      publish({ type: 'page', target: 'pc_mouse', direction });
    }

    function sendHotkey(action) {
      enterImmersiveMode();
      publish({ type: 'hotkey', target: 'pc_mouse', action });
    }

    function isQuickTap(event, startX, startY) {
      return Math.hypot(event.clientX - startX, event.clientY - startY) < 10;
    }

    function blockPadBrowserGesture(event) {
      if (event.cancelable) event.preventDefault();
    }

    ['touchstart', 'touchmove', 'touchend', 'touchcancel'].forEach(eventName => {
      pad.addEventListener(eventName, blockPadBrowserGesture, { passive: false });
    });
    ['dblclick', 'contextmenu'].forEach(eventName => {
      pad.addEventListener(eventName, blockPadBrowserGesture);
    });

    pad.addEventListener('pointerdown', event => {
      blockPadBrowserGesture(event);
      enterImmersiveMode();
      dragging = true;
      pad.classList.add('dragging');
      pad.setPointerCapture(event.pointerId);
      padStartX = event.clientX;
      padStartY = event.clientY;
      lastX = event.clientX;
      lastY = event.clientY;
      setPadVisual(event.clientX, event.clientY, 0, 0);
      publish({ type: 'start', target: 'pc_mouse' });
    });

    pad.addEventListener('pointermove', event => {
      blockPadBrowserGesture(event);
      if (!dragging) return;
      const dx = event.clientX - lastX;
      const dy = event.clientY - lastY;
      lastX = event.clientX;
      lastY = event.clientY;
      setPadVisual(event.clientX, event.clientY, dx, dy);
      sendMove(dx, dy);
    });

    function stopPad() {
      dragging = false;
      pad.classList.remove('dragging');
      vectorLine.style.height = '0px';
      publish({ type: 'stop', target: 'pc_mouse' });
    }

    pad.addEventListener('pointerup', event => {
      blockPadBrowserGesture(event);
      const quickTap = isQuickTap(event, padStartX, padStartY);
      const now = performance.now();
      stopPad();
      if (quickTap && now - lastPadTap < 320) {
        publish({ type: 'click', target: 'pc_mouse', button: 'left' });
        lastPadTap = 0;
      } else if (quickTap) {
        lastPadTap = now;
      }
    });
    pad.addEventListener('pointercancel', stopPad);
    pad.addEventListener('lostpointercapture', () => { if (dragging) stopPad(); });

    document.getElementById('leftClickBtn').addEventListener('click', () => { enterImmersiveMode(); publish({ type: 'click', target: 'pc_mouse', button: 'left' }); });
    document.getElementById('rightClickBtn').addEventListener('click', () => { enterImmersiveMode(); publish({ type: 'click', target: 'pc_mouse', button: 'right' }); });
    pageUpBtn.addEventListener('click', () => sendPage('up'));
    pageDownBtn.addEventListener('click', () => sendPage('down'));
    document.querySelectorAll('[data-hotkey]').forEach(button => {
      button.addEventListener('click', () => sendHotkey(button.dataset.hotkey));
    });

    scrollWheel.addEventListener('pointerdown', event => {
      enterImmersiveMode();
      scrollDragging = true;
      scrollWheel.classList.add('scrolling');
      scrollWheel.setPointerCapture(event.pointerId);
      lastScrollY = event.clientY;
      publish({ type: 'scroll_start', target: 'pc_mouse' });
    });

    scrollWheel.addEventListener('pointermove', event => {
      if (!scrollDragging) return;
      const dy = event.clientY - lastScrollY;
      lastScrollY = event.clientY;
      sendScroll(dy);
    });

    function stopScroll() {
      scrollDragging = false;
      scrollWheel.classList.remove('scrolling');
      scrollVisualOffset = 0;
      scrollThumb.style.transform = 'translate(-50%, -50%)';
      publish({ type: 'scroll_stop', target: 'pc_mouse' });
    }

    scrollWheel.addEventListener('pointerup', stopScroll);
    scrollWheel.addEventListener('pointercancel', stopScroll);
    scrollWheel.addEventListener('lostpointercapture', () => { if (scrollDragging) stopScroll(); });
    scrollWheel.addEventListener('wheel', event => { event.preventDefault(); sendScroll(event.deltaY, true); }, { passive: false });

    goControlBtn.addEventListener('click', () => showPage('control'));
    goSettingsBtn.addEventListener('click', () => showPage('settings'));
    connectBtn.addEventListener('click', connectMQTT);
    disconnectBtn.addEventListener('click', disconnectMQTT);
    speedRange.addEventListener('input', () => speedText.textContent = speedRange.value);
    rateRange.addEventListener('input', () => rateText.textContent = rateRange.value);
    scrollSpeedRange.addEventListener('input', () => scrollSpeedText.textContent = scrollSpeedRange.value);

    setStatus(false, 'MQTT 未連線');
    log('Device ID: ' + DEVICE_ID);
    log('Ready.');
  </script>
</body>
</html>
